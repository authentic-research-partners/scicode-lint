# Pattern: pt-007-inference-without-eval
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "pt-007"
name = "inference-without-eval"
category = "ai-inference"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Missing model.eval() during inference leaves dropout active and batchnorm updating. When torch.no_grad() is used but model.eval() is missing, the model behaves incorrectly - dropout still randomly zeros activations and batchnorm uses batch statistics instead of learned running statistics.
"""

explanation = """
Missing model.eval() leaves dropout active (randomly zeroing activations) and batchnorm using batch statistics instead of learned running statistics, producing incorrect and non-deterministic inference results.
"""

tags = ["pytorch", "inference", "dropout", "batchnorm"]
related_patterns = ["pt-001-missing-train-mode"]
references = [
    "https://pytorch.org/docs/stable/generated/torch.nn.Module.html#torch.nn.Module.eval",
    "https://pytorch.org/docs/stable/generated/torch.nn.Dropout.html",
    "https://pytorch.org/docs/stable/generated/torch.nn.BatchNorm2d.html",
]

[detection]
question = """
Analyze inference/evaluation setup in this code.

torch.no_grad() only disables gradient computation (saves memory). model.eval() sets the model to evaluation mode (disables dropout, uses running stats for batchnorm). Both are needed for correct inference.

The bug only applies when the code's PURPOSE is correct inference results (evaluation, testing, prediction). If the code intentionally stays in training mode (benchmarks, training profiling), the absence of model.eval() is correct.

Does this code use no_grad() or inference_mode() without model.eval()?

Look for:
- torch.no_grad() or torch.inference_mode() context without corresponding model.eval()
- Inference code that disables gradients but leaves model in training mode

NOT a bug (answer NO):
- The code is explicitly benchmarking or profiling training performance (function name or docstring says "benchmark", "profile", or "training", or model.train() is explicitly called before the no_grad block)
- The code uses a high-level framework trainer that manages eval mode internally — trainer.test(), trainer.validate(), trainer.predict() (PyTorch Lightning), Trainer.evaluate(), Trainer.predict() (Hugging Face), or equivalent
- model.eval() is present (with or without no_grad())
- No no_grad()/inference_mode() usage at all

YES = Bug found: no_grad()/inference_mode() used for inference/evaluation but model.eval() is missing, and the code is not benchmarking training behavior, and no framework trainer manages the lifecycle
NO = Correct: model.eval() present, intentional training-mode benchmark, framework trainer manages eval mode, or no no_grad() usage
"""

warning_message = """
Missing model.eval() leaves dropout active and batchnorm using batch statistics instead of learned running statistics, producing incorrect inference results.
"""

min_confidence = 0.85
false_positive_risks = [
    "model.eval() called in the constructor (__init__) — the model is set to eval mode at creation time, so inference methods correctly omit a separate eval() call",
    "Framework-managed trainers (e.g., PyTorch Lightning Trainer.predict(), Trainer.test(), or Hugging Face Trainer.evaluate()) handle eval mode internally, so user code does not need explicit model.eval()",
]

