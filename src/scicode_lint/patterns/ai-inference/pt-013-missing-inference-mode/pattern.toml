[meta]
id = "pt-013"
name = "missing-inference-mode"
category = "ai-inference"
severity = "medium"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Using torch.no_grad() instead of torch.inference_mode() for production inference. inference_mode() is faster and uses less memory because it disables view tracking and version counting.
"""

explanation = """
torch.inference_mode() is faster than no_grad() for production inference. Use inference_mode() when gradients will never be needed.
"""

tags = ["pytorch", "inference", "performance"]
related_patterns = ["pt-007-inference-without-eval"]
references = [
    "https://pytorch.org/docs/stable/generated/torch.autograd.grad_mode.inference_mode.html",
    "https://pytorch.org/docs/stable/generated/torch.no_grad.html",
]

[detection]
question = """
Is this PRODUCTION INFERENCE code using torch.no_grad() instead of torch.inference_mode()?

KEY DISTINCTION — three categories:
1. PRODUCTION INFERENCE: API endpoints, model serving, standalone prediction scripts → use inference_mode()
2. TRAINING VALIDATION: evaluate/validation functions in training pipelines → no_grad() is fine
3. GRADIENT-BASED ANALYSIS: saliency maps, GradCAM, adversarial examples → no_grad() is fine (needs gradient tracking)

FIRST CHECK (function-level): Does this function call .backward() or set requires_grad=True anywhere?
→ If YES, it's gradient-based analysis code. Answer NO.

SECOND CHECK (file-level): Does the file have model.train(), optimizer.step(), or training loop code?
→ If YES, it's training code. Answer NO.

If NEITHER: this is production inference. Does it use no_grad() instead of inference_mode()?

YES = Production inference (no training code, no gradient analysis) using no_grad() instead of inference_mode()
NO = Training validation, gradient-based analysis (.backward() or requires_grad=True present), or already uses inference_mode()
"""

warning_message = """
torch.inference_mode() is faster than no_grad() for production inference. Use inference_mode() when gradients will never be needed.
"""

min_confidence = 0.85
false_positive_risks = [
    "Training pipelines with validation phases where no_grad() is used correctly during model.eval() validation loops — the file contains optimizer.step(), loss.backward(), and model.train() calls indicating training code",
    "Evaluation callbacks or metric computation functions that are part of a larger training workflow — no_grad() is appropriate because the training context may resume gradient computation afterward",
]

[tests]

[[tests.positive]]
file = "test_positive/production_inference_no_grad.py"
description = "Production inference server using torch.no_grad() instead of torch.inference_mode()"
expected_issue = "Production inference using no_grad() where inference_mode() would be faster"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "serve_prediction"
snippet = "with torch.no_grad():"
lines = [19]

[[tests.negative]]
file = "test_negative/training_with_validation.py"
description = "Training pipeline with validation phase using no_grad() correctly - file has optimizer.step(), loss.backward(), model.train()"

[[tests.negative]]
file = "test_negative/gradient_analysis.py"
description = "GradCAM and saliency map code using backward() and requires_grad - no_grad() is fine in gradient analysis"

[[tests.negative]]
file = "test_negative/scripted_model_inference.py"
description = "TorchScript model inference correctly using torch.inference_mode()"

[[tests.negative]]
file = "test_negative/production_inference_mode.py"
description = "Production inference correctly using torch.inference_mode()"

[[tests.positive]]
file = "test_positive/api_endpoint_no_grad.py"
description = "Image classification service with preprocessing pipeline using torch.no_grad()"
expected_issue = "Production image classification service using no_grad() instead of inference_mode()"
min_confidence = 0.85

[tests.positive.expected_location]
type = "method"
name = "classify_image"
snippet = "with torch.no_grad():"
lines = [20]

[[tests.positive]]
file = "test_positive/embedding_service.py"
description = "Similarity search engine using torch.no_grad() for query encoding and document indexing"
expected_issue = "Production similarity search using no_grad() instead of inference_mode() for encoding"
min_confidence = 0.85

[tests.positive.expected_location]
type = "method"
name = "find_similar"
snippet = "with torch.no_grad():"
lines = [16]
