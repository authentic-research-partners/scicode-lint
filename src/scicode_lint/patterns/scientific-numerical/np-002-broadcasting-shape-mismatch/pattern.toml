[meta]
id = "np-002"
name = "broadcasting-shape-mismatch"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Using .mean(axis=1) or .std(axis=1) without keepdims=True returns a 1D array that broadcasts incorrectly when used in arithmetic with the original 2D array. For example, `data - data.mean(axis=1)` broadcasts the 1D result against columns instead of rows. Use keepdims=True to preserve the shape for correct row-wise operations. Note: this pattern intentionally covers only .mean and .std (the two most common cases in scientific code).
"""

explanation = """
Missing keepdims=True on axis=1 reductions causes wrong broadcasting. Use data.mean(axis=1, keepdims=True) for correct row-wise operations.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/user/basics.broadcasting.html",
    "https://numpy.org/doc/stable/reference/generated/numpy.mean.html",
]

[detection]
question = """
Analyze row-wise reductions used in arithmetic with 2D arrays.

When .mean(axis=1) or .std(axis=1) is called without keepdims=True, the result collapses from 2D to 1D. If this 1D result is then used in arithmetic (+, -, *, /) with the original 2D array, NumPy broadcasting silently aligns it against columns instead of rows. The computation produces results without any error, but every value is wrong — row means get subtracted from the wrong rows. This corrupts downstream analysis (normalization, z-scores, whitening) in ways that are difficult to diagnose.

The fix is straightforward: use keepdims=True to preserve the 2D shape so broadcasting works along the intended axis.

Does this code use .mean(axis=1) or .std(axis=1) without keepdims=True where the result is used in arithmetic with a 2D array?

Example bugs:
  batch_mean = data.mean(axis=1)
  normalized = data - batch_mean

  row_means = X.mean(axis=1)
  return X - row_means

Not bugs:
  mean = data.mean(axis=1, keepdims=True)  — has keepdims=True
  col_mean = data.mean(axis=0)             — axis=0 is different
  scalar = row.mean(axis=1)                — result not used in 2D arithmetic

YES = Code has .mean(axis=1) or .std(axis=1) WITHOUT keepdims=True AND the result is used in arithmetic with a 2D array
NO = No .mean(axis=1)/.std(axis=1) calls exist, all use keepdims=True, only axis=0 reductions, or result is not used in 2D arithmetic
"""

warning_message = """
Missing keepdims=True: .mean(axis=1) returns 1D array that broadcasts against columns, not rows. Use keepdims=True for correct row-wise operations.
"""

min_confidence = 0.75
false_positive_risks = [
    "Cannot detect shape mismatches without explicit shape information",
    "Standard normalization (arr - arr.mean()) is safe",
    "sklearn/pandas handle broadcasting internally"
]

