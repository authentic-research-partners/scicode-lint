# Pattern: num-001-pattern
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "num-001"
name = "float-equality-comparison"
category = "scientific-numerical"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Floating point numbers should never be compared using == or != due to precision limitations. For example, 0.1 + 0.2 != 0.3 in floating point arithmetic. Use np.isclose() or np.allclose() with appropriate tolerance instead.
"""

explanation = """
Never use == on floats. 0.1 + 0.2 != 0.3 in floating point. Use np.isclose() or np.allclose() with appropriate tolerance.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/reference/generated/numpy.isclose.html",
    "https://numpy.org/doc/stable/reference/generated/numpy.allclose.html",
    "https://docs.python.org/3/tutorial/floatingpoint.html",
]

[detection]
question = """
Analyze equality comparisons in this code for floating point issues.

Floating point arithmetic has precision limitations: 0.1 + 0.2 != 0.3 due to binary representation. Direct equality (==, !=) on floats fails unpredictably.

Correct approach: Use np.isclose(), np.allclose(), or abs(a-b) < epsilon.

Does this code compare floats with exact equality where arithmetic rounding could cause the two sides to diverge?

Look for:
- norm == 1.0 after computing np.linalg.norm(x) (checking if a vector was normalized), or total == 1.0 after summing probabilities — these compare an arithmetic RESULT to an expected value, not a sentinel
- current == target where both sides are float variables from arithmetic results (e.g., convergence check comparing computed value to a target)
- (arr1 == arr2).all() on float arrays from different computations

NOT a bug (answer NO):
- x == 0 or norm == 0 used as a guard to detect a zero vector or absent value — checking for exact zero is semantically correct and intentional; isclose(x, 0) would be wrong there
- v == max(collection) or v == some_dict[key] where the right-hand side is the same float retrieved unmodified from the same data structure — no arithmetic has occurred between the two sides, so the comparison is bit-exact by construction
- Comparing integer counts, boolean flags, or integer-valued tensors to 0 or other integers — e.g., num_elements != 0, all_targets == 0 on a count array
- uses isclose/allclose/epsilon
- comparing integers/indices
- np.sign() comparisons (returns integer-like values)

YES = Bug found: float from arithmetic result compared using == or != to an independent expected value without tolerance
NO = Correct: uses isclose/allclose/epsilon, exact-zero sentinel check, value compared to itself from same container, or comparing integers
"""

warning_message = """
Never use == on floats. 0.1 + 0.2 != 0.3 in floating point. Use np.isclose() or np.allclose() with appropriate tolerance.

"""

min_confidence = 0.85
false_positive_risks = [
    "np.sign() returns float but has integer-like values (-1, 0, 1) — equality comparison is safe",
]

[tests]

[[tests.positive]]
file = "test_positive/float_equality.py"
description = "Direct == or != comparisons on floating point values (0.1+0.2 == 0.3) or array elements, which fail due to floating point precision"
expected_issue = "Floating point equality comparison using == or !="
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "check_convergence"
snippet = "if current == target:"
lines = [5]

[[tests.positive]]
file = "test_positive/array_comparison.py"
description = "Array equality checks using == with .all() or != on floating point arrays, and sum comparisons that should use tolerance"
expected_issue = "Float array compared with exact equality"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "compare_arrays"
snippet = "if (arr1 == arr2).all():"
lines = [5]

[[tests.negative]]
file = "test_negative/proper_tolerance.py"
description = "Numerical algorithms (bisection, gradient descent) that use abs() with tolerance for convergence, never comparing floats with =="

[[tests.negative]]
file = "test_negative/integer_comparison.py"
description = "Exact equality comparison on integers, indices, counters, and flags where == is appropriate"

[[tests.positive]]
file = "test_positive/tolerance_check.py"
description = "Exact equality checks on computed floating point results (norm, probability sum, matrix product) where tolerance is needed due to numerical precision limits"
expected_issue = "Computed float values compared with exact equality (==) instead of tolerance-aware comparison"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "check_normalized"
snippet = "norm == 1.0"
lines = [6]

[[tests.negative]]
file = "test_negative/tolerance_check_correct.py"
description = "Linear algebra routines (softmax, Gram-Schmidt, power iteration) that use norm-based and abs() convergence checks, with no float equality comparisons"

[[tests.negative]]
file = "test_negative/zero_sentinel_check.py"
description = "Scientific routines using == 0 and != 0 as guards before division or normalization — exact-zero sentinel checks, not arithmetic comparisons"
