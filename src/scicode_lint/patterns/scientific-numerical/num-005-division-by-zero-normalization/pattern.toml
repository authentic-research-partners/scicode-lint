# Pattern: num-005-pattern
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "num-005"
name = "division-by-zero-normalization"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Division by standard deviation, range, or other computed values that could be zero produces inf or NaN. This commonly occurs in normalization when a feature is constant (std=0) or in min-max scaling when min equals max. Always add an epsilon guard or check for zero before dividing.
"""

explanation = """
Division by zero in normalization: std is 0 for constant features, producing inf or NaN. Check for zero std and handle it.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/reference/generated/numpy.std.html",
    "https://numpy.org/doc/stable/reference/generated/numpy.maximum.html",
]

[detection]
question = """
Analyze normalization operations for division by zero.

Standard deviation or range can be zero for constant features, causing inf or NaN.

PREREQUISITE: There must be a visible division operator (/ or /=) in this code. If no literal division syntax is present, answer NO immediately.

PREREQUISITE 2: If the only normalization in the code is a METHOD CALL with no visible division (e.g., normalize(), fit_transform(), StandardScaler()), answer NO immediately — the division is inside the library and handled safely.

REQUIRED CHECK — What is the denominator?
- If it is .sum(), .count(), len(), sum(mask), token counts → answer NO (this is averaging, not std normalization)
- If it is .std(), np.std(), np.sqrt(variance), (max-min), .norm(), np.linalg.norm() → continue to YES/NO check below
- If unsure → answer NO

Does this code divide by COMPUTED std/range/norm without zero protection?

The denominator must be SPECIFICALLY:
- A variable named std, stds, sigma, or holding result of .std() / np.std() / np.sqrt(var)
- A range expression: (max - min), x.max() - x.min(), computed max minus computed min
- A norm: np.linalg.norm(...), tensor.norm(), computed magnitude of a vector
AND none of the NO conditions apply.

NOT a bug (answer NO):
- No literal / or /= operator in the code (division happens inside a called method/function)
- Division by a sum/count: x / mask.sum(), scores / token_mask.sum(-1), total / count.sum(dim) — this is averaging or normalization by length, NOT std normalization
- Delegation: self.X.normalize(), scaler.fit_transform(X), sklearn.preprocessing.normalize(), or similar method calls that handle division internally
- Pre-computed constants: ImageNet stats [0.229, 0.224, 0.225], known non-zero values from module constants or config attributes
- sklearn.preprocessing.StandardScaler - handles zero std internally (replaces with 1.0)
- sklearn.preprocessing.MinMaxScaler - handles zero range internally
- torchvision.transforms.Normalize - uses pre-computed dataset statistics
- Epsilon guards: (std + 1e-8), np.maximum(std, eps), .clip(min=eps)
- Explicit zero checks before division
- np.where(condition, a / b, fallback) — zero elements masked by the condition

YES = Bug: visible / or /= dividing by COMPUTED std/range/norm (not sum/count) from data without epsilon/check
NO = Clean: no visible division, denominator is sum/count, delegation to library, pre-computed constants, or guarded division
"""

warning_message = """
Division by zero when normalization factor (std, range, or norm) is zero for constant/zero-valued data, producing inf or NaN. Add an epsilon guard or explicit zero check before dividing.

"""

min_confidence = 0.85
false_positive_risks = [
    "Pre-computed constants (ImageNet/CIFAR std values) could be mistakenly flagged if not recognized as constants",
]

[tests]

[[tests.positive]]
file = "test_positive/unguarded_division.py"
