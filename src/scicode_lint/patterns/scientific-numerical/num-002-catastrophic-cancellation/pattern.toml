[meta]
id = "num-002"
name = "catastrophic-cancellation"
category = "scientific-numerical"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Subtracting nearly equal large numbers causes catastrophic cancellation, losing significant digits of precision. Common examples include naive variance calculation (mean_sq - mean^2) and exponential differences.
"""

explanation = """
Catastrophic cancellation: subtracting nearly equal large numbers loses precision. Restructure the formula to avoid this.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/reference/generated/numpy.var.html",
]

[detection]
question = """
Analyze numerical computations for catastrophic cancellation — subtracting two nearly equal numbers silently loses significant digits of precision, producing wrong results with no error raised.

Classic example: computing variance as mean(x²) - mean(x)² loses all precision when values are large because x² terms dominate and their difference is tiny.

Correct approach: Use stable algorithms (np.var, np.std) or numerically stable formulations.

Before flagging: confirm the subtraction is between two values computed from the SAME input array via different aggregation paths (e.g., one computes mean(x²), the other computes mean(x)²). If the operands come from separate data sources or represent predictions vs. ground truth, answer NO.

Does this code subtract nearly equal numbers derived from the same data through separate aggregation paths?

Look for:
- Naive variance: mean_sq - mean**2 or mean(x**2) - mean(x)**2 — subtracting two quantities derived from the SAME data through separate aggregation paths
- Exponential differences: exp(a) - exp(b) where a ≈ b (use expm1 or log-space)
- Numerical derivatives with tiny step size: (f(x+h) - f(x-h)) / (2*h) or (f(x+h) - f(x)) / h where h is very small (e.g., 1e-10) — f(x+h) and f(x-h) are nearly equal, their difference loses precision before dividing by h amplifies the error

Do NOT flag:
- targets - predictions, y_true - y_pred, actual - forecast, observed - modeled — these are residuals between semantically different quantities, not cancellation
- Any subtraction where the two operands represent SEMANTICALLY DIFFERENT quantities (ground truth vs. estimate)
- Subtraction used to compute errors, residuals, or differences for plotting/reporting
- np.var(), np.std(), sklearn scalers, element-wise vector differences
- np.gradient() or np.diff() — these use appropriate step sizes internally

YES = Bug found: naive variance formula or subtraction of two values from same data via different aggregation paths
NO = Correct: uses stable algorithms, residuals between independent quantities, or subtraction of well-separated values
"""

warning_message = """
Catastrophic cancellation: subtracting nearly equal numbers loses precision. Use np.var() instead of mean(x^2)-mean(x)^2, expm1/log1p for exponential differences, or np.gradient for numerical derivatives.
"""

min_confidence = 0.85
false_positive_risks = [
    "General subtraction is NOT catastrophic cancellation",
    "sklearn scalers use stable algorithms internally",
    "Element-wise vector difference (point1 - point2) is safe; subtracting two scalar magnitudes or norms (norm1 - norm2) can cancel"
]

