author = "scicode-lint"

description = """
Passing large arrays to multiprocessing causes expensive data copying. Each process receives a full copy: 4 processes on a 4GB array = 16GB. Use multiprocessing.shared_memory or pass indices instead of data.
"""

explanation = """
Data duplication: multiprocessing copies data to each process. 4 processes on a 4 GB array = 16 GB. Use multiprocessing.shared_memory or pass indices instead of data.
"""

tags = []
related_patterns = []
references = [
    "https://docs.python.org/3/library/multiprocessing.shared_memory.html",
    "https://docs.python.org/3/library/multiprocessing.html#sharing-state-between-processes",
]

[detection]
question = """
Analyze multiprocessing data transfer patterns.

Passing large arrays to multiprocessing causes expensive data copying. Each process receives a full copy: 4 processes on a 4GB array = 16GB memory usage.

CRITICAL: Only flag RAW Python multiprocessing (Pool, Process, ProcessPoolExecutor) used directly. Library APIs with built-in multiprocessing handle this internally.

Does this code copy the SAME large array to EACH worker process using raw multiprocessing?

BOTH conditions must be true for YES:
1. Large array passed to workers (not small slices, indices, or metadata)
2. Each worker receives the SAME full data (not a unique small slice per worker)

Look for:
- pool.map(func, [large_array] * N) duplicating array N times
- ProcessPoolExecutor submitting same large array to multiple workers
- functools.partial closing over a large array, submitted to multiple workers
- executor.submit(obj.method, ...) where obj holds a large array as an attribute

NOT a bug (answer NO):
- Library APIs with built-in multiprocessing: datasets.map(num_proc=N), joblib.Parallel, Dask, Ray — these manage memory internally
- Each worker receives a DIFFERENT small slice of data (pre-sliced dispatch, 1/N of data per worker)
- Small data only (< ~100MB per worker)
- Uses multiprocessing.shared_memory, numpy memmap, or file-based sharing

YES = Bug found: same large array copied to each worker via raw Pool/Process/ProcessPoolExecutor
NO = Correct: library API, pre-sliced data, shared memory, indices, or small data
"""

warning_message = """
Data duplication: multiprocessing copies data to each process. 4 processes on a 4 GB array = 16 GB. Use multiprocessing.shared_memory or pass indices instead of data.
"""

min_confidence = 0.85
false_positive_risks = [
    "Library APIs with built-in multiprocessing (joblib.Parallel, datasets.map, Dask, Ray) manage memory internally",
    "Pre-sliced dispatch where each worker gets a unique small slice of data",
]

