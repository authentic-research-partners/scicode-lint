[meta]
id = "perf-004"
name = "unnecessary-intermediate-arrays"
category = "scientific-performance"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Creating large intermediate arrays (e.g., squared = diff ** 2; summed = np.sum(squared)) wastes memory when optimized functions exist. Use np.linalg.norm() instead of manual norm computation, or in-place operations to avoid temporary allocations.
"""

explanation = """
Materializing large intermediate arrays wastes memory. Use np.linalg.norm or in-place operations to avoid temporary allocations.

"""

tags = []
related_patterns = []
references = [
    "https://numpy.org/doc/stable/reference/generated/numpy.linalg.norm.html",
    "https://numpy.org/doc/stable/reference/ufuncs.html#ufuncs-output-type",
]

[detection]
question = """
Analyze computations for unnecessary intermediate arrays that manually reimplement a mathematical operation already available as a single optimized NumPy/PyTorch/SciPy function.

The bug: A chain of named intermediate arrays that reimplements a known mathematical primitive, when a single library function would compute the same result without materializing intermediates.

Example of the problem:
  diff = vectors - mean
  squared = diff ** 2
  summed = np.sum(squared, axis=1)
  distances = np.sqrt(summed)

This manually reimplements L2 norm and could be replaced by np.linalg.norm(vectors - mean, axis=1).

Known reimplementation patterns to look for:
- L2/L1/Lp norms: diff=a-b; sq=diff**2; s=sum(sq); sqrt(s) → np.linalg.norm(a-b). The subtraction IS part of the replaceable chain — np.linalg.norm(a - b, axis=1) handles it.
- Dot products: sum(a * b) → np.dot() or np.einsum()
- Pairwise distances: manual loops → scipy.spatial.distance.cdist()
- Matrix norms: manual computation → np.linalg.norm(matrix)
- Cosine similarity: dot/(norm_a*norm_b) → scipy.spatial.distance.cosine or F.cosine_similarity

Does this code manually reimplement a mathematical operation that a single NumPy/PyTorch/SciPy function already provides?

The chain must be replaceable by a SPECIFIC, NAMED single function. If no such function exists for the operation, answer NO.

BEFORE answering YES, check: Is each intermediate used EXACTLY ONCE? If any intermediate is used in 2+ different expressions (e.g., diff used for both norm and arctan2), it is NOT unnecessary — answer NO.

Correct patterns that must NOT be flagged:
- Inline expression chains with no named intermediates: torch.log(1 + torch.exp(x)), np.sqrt(np.sum(x**2)), etc. If no intermediate is assigned to a variable name, answer NO
- Activation functions implemented as expressions: torch.log(1 + torch.exp(x)) (softplus), torch.sigmoid(x), x * torch.tanh(x) (swish/SiLU), etc. Even if torch.nn.functional equivalents exist, these are not the intermediate-array materialization this pattern targets
- Necessary output construction from incompatible input formats: building a dense array from sparse (index, value) pairs, or constructing an output buffer that must be fully built before it can be consumed. If the intermediate IS the output of a conversion step (not a throwaway temp), answer NO
- In-place operations (-=, /=, *=, np.clip with out=) — no intermediates created
- Pre-allocation: result = np.zeros(...); result[i] = val (output buffer, not temporary)
- Algorithmic chains (sorting+indexing+stacking, batch collation, per-variable normalization) with no single-function equivalent
- Operations on fixed-size small arrays (< ~100 elements regardless of input)
- PyTorch/NumPy built-in operations like torch.norm(), np.linalg.norm() (already optimized)
- Code with no array math (training loops, data loading, model setup)
- Note: "single function" means a single NumPy/PyTorch/SciPy FUNCTION CALL like np.linalg.norm(), NOT a class like StandardScaler

YES = Bug found: 2+ named intermediate variables (assigned with =), each used exactly once, whose sole purpose is computing a final result replaceable by a single named library function (e.g., np.linalg.norm)
NO = Correct: any intermediate reused in 2+ places, no single-function replacement exists, no named intermediates, or uses optimized functions
"""

warning_message = """
Materializing large intermediate arrays wastes memory. Use np.linalg.norm or in-place operations to avoid temporary allocations.

"""

min_confidence = 0.85
false_positive_risks = [
    "Intermediates that are reused multiple times are efficient, not unnecessary",
    "Pre-allocation patterns (np.zeros then indexed assignment) look like chains but are not",
    "Algorithmic chains with no single-function replacement (sorting, collation, per-variable ops)",
    "Operations on fixed-size small arrays where memory waste is negligible",
]

[tests]

[[tests.positive]]
file = "test_positive/intermediate_array_creation.py"
description = "Manual column-wise std deviation via mean/diff/squared/variance/sqrt chain instead of np.std, and Frobenius norm via diff/squared/sum/sqrt instead of np.linalg.norm"
expected_issue = "Manual reimplementation of standard deviation and Frobenius norm via intermediate arrays"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "column_stddev"
snippet = "squared = diff**2"
lines = [7]

[[tests.positive]]
file = "test_positive/manual_norm_computation.py"
description = "Pairwise distance manually reimplementing L2 norm via diff/squared/summed/sqrt chain instead of np.linalg.norm"
expected_issue = "Manual L2 norm reimplementation via intermediate arrays replaceable by np.linalg.norm"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "compute_pairwise_distances"
snippet = "squared = diff**2"
lines = [9]

[[tests.negative]]
file = "test_negative/linalg_norm.py"
description = "Weighted covariance and PCA projection using single-expression NumPy operations without named intermediates"

[[tests.negative]]
file = "test_negative/inplace_operations_opt.py"
description = "Uses in-place operations with -= and /= to avoid creating temporary arrays"

[[tests.positive]]
file = "test_positive/chained_ops.py"
description = "Manual L2 norm and cosine similarity via diff/squared/sum/sqrt chains instead of np.linalg.norm and np.dot"
expected_issue = "Manual reimplementation of L2 norm and cosine similarity via intermediate arrays"
min_confidence = 0.85

