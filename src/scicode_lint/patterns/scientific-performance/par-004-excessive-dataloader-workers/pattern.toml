[meta]
id = "par-004"
name = "excessive-dataloader-workers"
category = "scientific-performance"
severity = "medium"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Setting DataLoader num_workers too high (e.g., >8 or more than CPU cores) causes each worker to duplicate the dataset in memory, leading to OOM errors or thrashing. Start with num_workers=4 and increase while monitoring memory usage.
"""

explanation = """
num_workers too high: each worker duplicates the dataset in memory. Too many workers causes OOM or thrashing. Start with 4 and increase while monitoring memory.
"""

tags = []
related_patterns = []
references = [
    "https://pytorch.org/docs/stable/data.html#single-and-multi-process-data-loading",
    "https://pytorch.org/tutorials/recipes/recipes/tuning_guide.html",
]

[detection]
question = """
Analyze DataLoader configuration for excessive worker count.

Setting num_workers too high causes each worker to duplicate the dataset in memory, leading to OOM errors or thrashing. The safe range depends on the machine, but hardcoded values above 16 are almost always excessive.

Does this code set DataLoader num_workers to an excessively high hardcoded value?

Look for:
- num_workers set to a hardcoded value > 16 (e.g., num_workers=32, num_workers=48)
- num_workers = cpu_count() * N where the multiplier is >= 2

NOT a bug (answer NO):
- num_workers in range 1-8 (safe for most machines)
- Adaptive calculation with a reasonable cap: min(N, cpu_count() // 2)
- num_workers read from config or environment variable

YES = Bug found: num_workers hardcoded to an excessively high value (>16) or set to an unbounded CPU multiplier
NO = Correct: reasonable fixed value (1-8), adaptively capped, or configurable
"""

warning_message = """
num_workers too high: each worker duplicates the dataset in memory. Too many workers causes OOM or thrashing. Start with 4 and increase while monitoring memory.
"""

min_confidence = 0.85
false_positive_risks = []

