[meta]
id = "rep-003"
name = "hardcoded-hyperparameters"
category = "scientific-reproducibility"
severity = "medium"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Hardcoded hyperparameters scattered through code hinder reproducibility. Magic numbers buried in code can't be tracked or reproduced across experiments. Use a config file or argparse for all hyperparameters.
"""

explanation = """
Hardcoded magic numbers: parameters buried in code can't be tracked or reproduced. Use a config file or argparse for all hyperparameters.

"""

tags = ["configuration", "hyperparameters", "reproducibility"]
related_patterns = []
references = [
    "https://scikit-learn.org/stable/common_pitfalls.html",
]

[detection]
question = """
Analyze hyperparameter management for reproducibility.

Magic numbers buried in code cannot be tracked or reproduced across experiments. Hyperparameters scattered through functions make it impossible to know what configuration produced specific results.

Correct approach: Use config file, argparse, or named constants at module top.

Does this code have hardcoded hyperparameters that are UNREACHABLE by callers without modifying source code?

Look for:
- Learning rate, batch size, epochs as literals INSIDE function bodies with no way for callers to override
- Dropout rates, hidden dimensions as magic numbers buried in logic, not exposed as parameters
- No config file, argparse, constants section, or function parameters for these values

NOT a bug (answer NO):
- Named constants defined at MODULE TOP LEVEL (e.g., LEARNING_RATE = 0.001, BATCH_SIZE = 32, EPOCHS = 100) — even if not overridable by callers, they are organized, trackable, and easy to find. This is a correct approach
- Default arguments in function/class signatures: def train(lr=0.001, batch_size=32) — callers can override these
- Constructor defaults: def __init__(self, hidden_dim=256, dropout=0.3) — configurable by callers
- Values inside HPO/tuning scripts (Optuna, hyperopt, Ray Tune) serving as search bounds or warm-start seeds
- Commented-out or dead code that never executes
- When a config system is substantially present and remaining literals are display flags, standard constants, or non-tunable settings
- Dict/YAML/JSON config loaded from file with .get() fallback defaults
- Architecture constants required to match a specific pretrained model checkpoint (e.g., input_dim, hidden_dims, layer counts that must align with saved weights) — these are load-time constraints, not tunable hyperparameters
- Hardcoded literals with an explanatory comment directly attached that justifies why the value is a fixed design choice (e.g., "# 50% mutation + 50% pubchem" or "# full mutation by design"), provided the surrounding function also passes all genuinely tunable values as parameters or via config

YES = Bug found: tunable hyperparameters hardcoded inside function bodies with no justification comment and no way for callers to override — especially when the same function/class uses argparse/config for other values, revealing inconsistency
NO = Correct: uses config/argparse/constants, values are function/constructor defaults (overridable), architecture constraints from pretrained checkpoints, documented design choices, or no hyperparameters present
"""

warning_message = """
Hardcoded magic numbers: parameters buried in code can't be tracked or reproduced. Use a config file or argparse for all hyperparameters.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/hardcoded_hyperparameters.py"
description = "Neural network training with hardcoded hyperparameters (learning rate 0.01, momentum 0.9, dropout 0.3, batch size 64, epochs 50, layer dimensions) instead of config."
expected_issue = "Hyperparameters like learning rate, dropout rate, batch size, and layer dimensions are hardcoded as magic numbers"
min_confidence = 0.85

[tests.positive.expected_location]
type = "class"
name = "NeuralNet"
snippet = "self.dropout = nn.Dropout(0.3)"
lines = [12]

[[tests.positive]]
file = "test_positive/magic_paths_and_values.py"
description = "Autoencoder with hardcoded layer dimensions (784, 256, 64, 16), learning rate (0.0003), scheduler params, epochs (150), and grad clipping (1.0)."
expected_issue = "Hyperparameters (learning rate, layer dimensions, epochs, scheduler params) hardcoded in function bodies"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "build_autoencoder"
snippet = "nn.Linear(784, 256)"
lines = [7]

[[tests.negative]]
file = "test_negative/config_based.py"
description = "Uses argparse to define all hyperparameters as configurable command-line arguments with defaults."

[[tests.negative]]
file = "test_negative/constants_file.py"
description = "All magic numbers and paths extracted to named constants at the top of the file for easy tracking."


