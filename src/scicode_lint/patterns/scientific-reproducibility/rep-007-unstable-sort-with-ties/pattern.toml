[meta]
id = "rep-007"
name = "unstable-sort-with-ties"
category = "scientific-reproducibility"
severity = "medium"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Using numpy sort() or argsort() without kind='stable' on data with ties produces non-deterministic ordering of equal elements. Default quicksort has arbitrary tie-breaking.
"""

explanation = """
For reproducible sorting with potential ties, use kind='stable' (mergesort) which preserves relative order of equal elements.
"""

tags = ["numpy", "sorting", "reproducibility"]
related_patterns = ["rep-011-set-iteration-order-dependency"]
references = [
    "https://numpy.org/doc/stable/reference/generated/numpy.sort.html",
]

[detection]
question = """
Analyze sorting for stable tie-breaking.

NumPy's default sort (quicksort) does not guarantee stable ordering of equal elements.
This matters when data has REALISTIC ties AND tie-breaking order CHANGES the scientific outcome.

BOTH conditions must be true for YES:
1. Data is integer/discrete with likely ties (integer scores, categories, binned values, counts)
2. Tie-breaking order CHANGES the scientific outcome (different results depending on which tied item comes first)

Does this code sort INTEGER or DISCRETE data where tie-breaking order affects results?

Look for:
- np.argsort() without kind='stable' on integer scores, rankings, categories
- Sorting discrete data (counts, labels, binned values) where ties are common AND order matters

NOT a bug (answer NO) - ties impractical, already handled, or outcome unaffected:
- Continuous float outputs from neural networks (softmax, log_probs, embeddings, predicted spectra, intensities, distributions) — ANY predicted values from neural network forward passes
- Random floating-point values (np.random.randn)
- Computed distances, similarities, or other continuous metrics
- Ties exist but tied items are scientifically interchangeable (selecting any k from equal-valued pool gives same downstream result)
- kind='stable' already specified
- np.lexsort() (always uses mergesort/stable internally)
- pandas sort_values() with kind='mergesort'
- pandas sort_values() with MULTIPLE columns where a tiebreaker column makes ties unique (e.g., sort_values(["score", "id"]) — the "id" column breaks ties deterministically)

YES = Bug: Unstable sort on INTEGER/DISCRETE data where tie-breaking order changes scientific outcome
NO = Clean: Continuous outputs (ties impractical), tied items are interchangeable, kind='stable' used, or data is unique
"""

warning_message = """
Default numpy sort has non-deterministic tie-breaking. Use kind='stable' for reproducible ordering of equal elements.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/unstable_sort.py"
description = "Genomics pipeline sorting discretized expression levels, integer ages, variant counts without stable sort"
expected_issue = "np.argsort() and np.sort() without kind='stable' on discrete genomics data"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "rank_predictions"
snippet = "np.argsort(levels)"
lines = [9]

[[tests.negative]]
