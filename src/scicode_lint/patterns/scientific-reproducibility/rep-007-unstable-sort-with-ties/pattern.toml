[[tests.negative]]
file = "test_negative/stable_sort.py"
description = "Using kind='stable' for reproducible tie-breaking"

[[tests.negative]]
file = "test_negative/continuous_ml_outputs.py"
description = "Continuous float ML outputs (softmax, similarities, distances) - ties are practically impossible"

