[meta]
id = "rep-010"
name = "naive-datetime-processing"
category = "scientific-reproducibility"
severity = "medium"
version = "1.0.0"
created = "2026-03-08"
updated = "2026-03-08"
author = "scicode-lint"

description = """
Using datetime.now() or datetime.utcnow() without timezone creates naive datetimes that depend on system timezone. Results vary between machines or after timezone/DST changes.
"""

explanation = """
Use timezone-aware datetimes: datetime.now(timezone.utc) instead of datetime.now() or datetime.utcnow().
"""

tags = ["datetime", "timezone", "reproducibility"]
related_patterns = []
references = [
    "https://docs.python.org/3/library/datetime.html",
    "https://docs.python.org/3/library/zoneinfo.html",
]

[detection]
question = """
Analyze datetime handling for REPRODUCIBILITY-CRITICAL timezone issues.

STOP — answer NO immediately if ANY of these apply:
- Directory/file naming for organizing outputs (e.g., results_2024_01_15/)
- Logging, display, or progress reporting timestamps
- User-facing metadata that can be overridden via arguments
- datetime.utcnow() with explicit timezone conversion math (e.g., adding timedelta for offset) — this is deterministic
- No datetime.now() or datetime.utcnow() in the code

This pattern ONLY applies to datetimes that affect SCIENTIFIC REPRODUCIBILITY:
- Timestamps stored IN scientific data records (experiment results, measurements)
- Timestamps used for data filtering or selection (time-based splits, date ranges)
- Timestamps that must match across machines or runs

ALL THREE conditions must be true for YES:
1. Naive datetime created (datetime.now() without tz, or datetime.utcnow() stored directly)
2. Value stored in scientific data records OR used for data filtering/selection
3. NOT purely for file naming, logging, display, or progress reporting

WHY THIS MATTERS: datetime.now() returns local timezone. Scientific data with naive timestamps varies between machines/timezones.

YES = Bug found: naive datetime stored in SCIENTIFIC DATA records or used for data filtering
NO = File naming/logging/display use, utcnow() with explicit timezone math, or timezone-aware datetime used
"""

warning_message = """
Naive datetime depends on system timezone. Use datetime.now(timezone.utc) for reproducible timestamps.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/naive_datetime.py"
description = "Creating naive datetimes without timezone in scientific data"
expected_issue = "datetime.now() and datetime.fromtimestamp() without timezone in scientific data records"
min_confidence = 0.85

[tests.positive.expected_location]
type = "module"
name = ""
snippet = "datetime.now()"
lines = [6, 13, 14, 22]

[[tests.negative]]
file = "test_negative/unix_timestamp.py"
description = "Using unix timestamps (integer)"

[[tests.negative]]
file = "test_negative/no_datetime.py"
description = "No datetime operations"

[[tests.negative]]
file = "test_negative/timezone_aware.py"
description = "Using timezone-aware datetime.now(timezone.utc)"

[[tests.negative]]
file = "test_negative/directory_naming.py"
description = "Datetime for directory naming and logging - organizational metadata, not scientific data"

# === Auto-generated entries (review and update) ===
[[tests.positive]]
file = "test_positive/datetime_naive.py"
description = "Naive datetime stored in scientific measurement data"
expected_issue = "datetime.now() without timezone in measurement records"
min_confidence = 0.85

[tests.positive.expected_location]
type = "module"
name = ""
snippet = "datetime.now()"
lines = [10, 21]

[[tests.positive]]
file = "test_positive/experiment_timestamps.py"
description = "Experiment tracker storing naive datetime.now() in measurement records and using it for data filtering"
expected_issue = "datetime.now() stored in scientific measurement records and used for data filtering"
min_confidence = 0.85

[tests.positive.expected_location]
type = "method"
name = "record_measurement"
snippet = "datetime.now()"
lines = [8, 16]

