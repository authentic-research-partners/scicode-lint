[meta]
id = "rep-004"
name = "missing-random-seed"
category = "scientific-reproducibility"
severity = "medium"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Missing random seed initialization causes non-reproducible results. When random operations are used without setting seeds for np.random, torch, and random modules, results will differ between runs.
"""

explanation = """
No random seed set. Results will differ between runs. Set seeds for np.random, torch, and random at the start.

"""

tags = []
related_patterns = []
references = [
    "https://docs.python.org/3/library/random.html",
    "https://numpy.org/doc/stable/reference/random/generator.html",
]

[detection]
question = """
Analyze random number usage for reproducibility in TRAINING/EVALUATION/DATA-SPLITTING/SIMULATION code.

Code using random operations without seed initialization produces different results each run. For reproducible experiments, all random sources (numpy, torch, random) must be seeded.

SCOPE: Flag code at the TOP-LEVEL ENTRY POINT of a script or experiment. This means:
- main() functions
- if __name__ == "__main__": blocks
- Top-level train()/run()/fit() functions that are the outermost call
- Module-level executable code (statements at indent level 0 outside any function/class) — these run when the script is executed
- Functions that directly contain random operations (np.random.*, torch.rand*, random.*) in their body

Do NOT flag:
- Functions that accept a model or dataloader as input (they don't own initialization)
- DataLoader construction calls (shuffle=True alone is not a seed issue)

FIRST: Verify the code actually contains random operations. If NONE of these appear, answer NO immediately:
  np.random.*, torch.rand*, torch.randn*, random.random*, random.shuffle, torch.randperm, np.random.shuffle, np.random.choice

Do NOT flag code that only:
- Calls model.forward() or model() without training
- Reads data from files (open(), pd.read_csv(), sdf parsing, HDF5 loading)
- Runs in model.eval() with torch.no_grad()
- Computes metrics from fixed predictions

Safe patterns (answer NO):
- Seed set anywhere in file (np.random.seed, torch.manual_seed, random.seed)
- np.random.default_rng(seed) or np.random.Generator with explicit seed
- torch.Generator().manual_seed(seed) or torch.Generator with explicit seed
- seed_everything(...), pl.seed_everything(...), or similar utility — even with dynamic/variable seeds
- Function accepts seed parameter or random_state parameter
- worker_init_fn that sets worker-specific seeds
- Any __getitem__ method (Dataset subclass) — random sampling here is intentional augmentation
- collate_fn functions — random operations are intentional per-batch augmentation
- Any function named transform, augment, augmentation, or that accepts a sample/img/audio argument and returns a modified version — randomness here improves generalization by design
- Code that calls time.time(), timeit, or measures memory (e.g., torch.cuda.max_memory_allocated) — random inputs are irrelevant to timing measurements
- Classes/functions named Fake*, Dummy*, Synthetic*, Bench*, or Profil* — intentional throwaway data
- Any torch.randn/np.random call where the output is passed directly to a model and the result is discarded or used only for timing/memory measurement
- Test files

STRONG indicator of a real bug (raises confidence):
- Code references args.seed or config.seed in filenames, log directories, or comments BUT never calls torch.manual_seed()/np.random.seed()/random.seed() with it — the developer INTENDED reproducibility but failed to implement it

YES = Bug found: random operations in a top-level training/evaluation entry point without any seed mechanism
NO = Correct: seed set, seed parameter accepted, augmentation/benchmark context, helper function, no random ops present, or seed utility used
"""

warning_message = """
No random seed set. Results will differ between runs. Set seeds for np.random, torch, and random at the start.
"""

min_confidence = 0.80
false_positive_risks = [
    "Seeds may be set in a setup function elsewhere in file",
    "Utility functions called by seeded main code",
    "Test files may not need seeds"
]

[tests]

[[tests.positive]]
file = "test_positive/no_seed_random_ops.py"
description = "Pipeline function using np.random operations for data generation and splitting without any seed being set."
expected_issue = "Random operations (np.random.randn, np.random.uniform, np.random.permutation) used without any random seed set"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "run_pipeline"
snippet = "features = np.random.randn(n_samples, 50)"
lines = [6]

[[tests.positive]]
file = "test_positive/unseeded_simulation.py"
description = "Monte Carlo simulation using torch.randn and random.random without setting any seeds."
expected_issue = "Simulation uses random operations from torch and random module without any seed initialization"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "run_monte_carlo"
snippet = "positions = torch.randn(n_agents, 2)"
lines = [7]

[[tests.negative]]
file = "test_negative/seeded_data_generation.py"
description = "Sets both np.random.seed and torch.manual_seed at the start before any random operations."

[[tests.negative]]
file = "test_negative/reproducible_simulation.py"
description = "Monte Carlo simulation with torch.manual_seed and random.seed properly set for reproducibility."


