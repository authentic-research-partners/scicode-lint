# Pattern: rep-002-pattern
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "rep-002"
name = "cuda-nondeterminism"
category = "scientific-reproducibility"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
PyTorch CUDA operations are non-deterministic by default. For reproducible GPU training, set torch.use_deterministic_algorithms(True) and torch.backends.cudnn.benchmark = False. Without these flags, results may vary between runs even with the same random seed.
"""

explanation = """
CUDA non-determinism: some GPU ops are non-deterministic by default. Set torch.use_deterministic_algorithms(True) and torch.backends.cudnn.benchmark = False.

"""

tags = ["pytorch", "cuda", "gpu", "reproducibility"]
related_patterns = ["rep-001-incomplete-random-seeds"]
references = [
    "https://docs.pytorch.org/docs/stable/generated/torch.use_deterministic_algorithms.html",
    "https://docs.pytorch.org/docs/stable/notes/randomness.html",
]

[detection]
question = """
Analyze CUDA TRAINING code for reproducibility.

CUDA non-determinism matters during TRAINING because:
- Gradient computation uses non-deterministic algorithms
- Some ops like atomicAdd have race conditions during backward pass

IMPORTANT: Inference-only code does NOT need deterministic flags.

Does this CUDA TRAINING code lack deterministic flags?

Only flag if ALL of these are present:
1. PyTorch framework: import torch or import pytorch_lightning must be visible
2. Direct CUDA usage IN THIS CODE: .cuda() or .to(device) called on tensors/models (not just gpu=True config parameter)
3. TRAINING ORCHESTRATION: The function/snippet is a top-level training loop or training entry point, not a helper called by the training loop. Indicators:
   - Contains an epoch loop (for epoch in range(...))
   - Calls optimizer.step() AND loss.backward() in the same scope
   - Has a DataLoader iteration loop
   - Is named train(), fit(), run(), main(), or run_training()
   Model init helpers that only call .to(device) and return a model do NOT qualify even if model.train() appears.
4. Missing torch.use_deterministic_algorithms(True), OR missing torch.backends.cudnn.benchmark = False, OR both are missing

NOT a bug (answer NO):
- Non-PyTorch frameworks: PaddlePaddle, JAX, TensorFlow (different determinism APIs)
- Inference-only code: model.eval(), torch.no_grad(), no loss.backward()
- Both deterministic flags are set
- No CUDA usage in this code snippet (only class-level config like gpu=True)
- Performance/benchmarking code: functions that measure execution time (time.time(), torch.cuda.Event, timeit), memory usage (torch.cuda.memory_allocated, torch.cuda.max_memory_reserved), or throughput, OR functions whose docstring/comments describe comparing strategies/profiling — even if not named benchmark_* or profile_*. Non-deterministic algorithms are intentional in benchmarks
- No direct .cuda() or .to(device) calls visible
- Model construction/initialization functions that only build and return a model (e.g., functions named init_model, build_model, create_model, setup_model, or any function whose body only does: instantiate model, call .to(device) or .cuda(), and return the model — with no optimizer, loss, or training loop present). Determinism flags are global PyTorch settings; they belong in training orchestration code, not in model factory helpers

YES = Bug: PyTorch CUDA training orchestration code with direct .cuda()/.to(device) calls without deterministic flags
NO = Correct: non-PyTorch, inference-only, deterministic flags set, no direct CUDA usage, benchmarking code, or model factory/init helper
"""

warning_message = """
CUDA non-determinism: some GPU ops are non-deterministic by default. Set torch.use_deterministic_algorithms(True) and torch.backends.cudnn.benchmark = False.

"""

min_confidence = 0.85
false_positive_risks = []

[tests]

[[tests.positive]]
file = "test_positive/cuda_without_deterministic.py"
description = "CNN model training on CUDA without setting deterministic algorithms or disabling cudnn benchmark."
expected_issue = "CUDA training code lacks torch.use_deterministic_algorithms(True) or torch.backends.cudnn.benchmark = False"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "train_model"
snippet = "loss.backward()"
lines = [36]

[[tests.positive]]
file = "test_positive/gpu_training_no_flags.py"
description = "GPU training loop that checks for CUDA availability but doesn't configure deterministic behavior."
expected_issue = "Training uses CUDA device without deterministic flags, results may vary between runs"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "train_on_gpu"
snippet = "device = torch.device(\"cuda\")"
lines = [10]

[[tests.negative]]
file = "test_negative/deterministic_cuda.py"
description = "Properly sets both torch.use_deterministic_algorithms(True) and torch.backends.cudnn.benchmark = False before CUDA usage."

[[tests.negative]]
file = "test_negative/reproducible_gpu_setup.py"
description = "Complete deterministic setup for CUDA with both required flags set before model/data operations."


