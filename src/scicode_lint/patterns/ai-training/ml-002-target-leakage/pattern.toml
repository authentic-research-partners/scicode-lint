# Pattern: ml-002-target-leakage
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "ml-002"
name = "target-leakage"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Target leakage occurs when a feature is derived from or directly uses the target variable (y). Common examples: creating a category from y.mean(), using target statistics as features, or encoding y-derived information into X.
"""

explanation = """
Target leakage: features contain information derived from the target variable. The model essentially sees the answer in the input, leading to unrealistic performance.
"""

tags = ["sklearn", "feature-engineering", "data-leakage", "target-variable"]
related_patterns = ["ml-003", "ml-006"]
references = ["https://scikit-learn.org/stable/common_pitfalls.html#data-leakage"]

[detection]
question = """
Does this code create INPUT FEATURES by aggregating or encoding the TARGET COLUMN on data that includes test-set rows?

WHY THIS MATTERS: Target leakage gives the model access to test answers during training, producing unrealistically high performance.

ALL THREE conditions must be true for YES:
1. Target column is the value being aggregated (groupby target, encode target, etc.)
2. The result is used as an INPUT FEATURE added to X (not just for loss/weights/filtering)
3. Done on data that includes test-set rows (full dataset before split)

STOP — check: Is the output added to X as a new column/feature? If no, NOT LEAKAGE.
STOP — check: Are the statistics computed once on the full dataset all-at-once (not in a sequential per-step loop where each observation extends the training window)? If sequential per-step, NOT LEAKAGE.

LEAKAGE patterns (flag these):
- df.groupby(...)['target'].transform('mean') added as a FEATURE on FULL dataframe
- Computing target statistics BEFORE any train/test split and adding to X
- Using df['target'].shift() or rolling() without proper temporal split, added as feature

NOT LEAKAGE (don't flag):
- Any statistics computed from the target that are passed to a loss function or optimizer (class_weights, pos_weight, sample_weight=...) — regardless of variable name. These configure training dynamics, they are never columns in X. Example: label_counts = Counter(y); weight = 1/label_counts[c] → passed to nn.CrossEntropyLoss(weight=...) — NOT LEAKAGE, this is loss weighting
- Time-series walk-forward loops: In code that loops over test observations one-at-a-time (e.g., for observation in test:) and appends each observation to a growing training array before fitting the next model step — this is standard ARIMA/SARIMAX/rolling forecasting. The "target" becomes a training observation at the next step, which is correct sequential methodology, NOT leakage. Do NOT flag np.append(train, observation) or train_data.append(obs) inside a walk-forward loop
- scaler.fit(X_train) — normalizing INPUT features, not encoding target
- Loss function weights derived from target distribution
- Pre-computed normalization constants applied to inputs
- train_df.groupby(...)['target'].agg(...) — stats from train subset only
- Statistics computed AFTER split, using only training rows
- Target used only for fit(X, y) or loss computation

Common target names: y, target, label, sales, price, amount, is_fraud.

YES = Found: target aggregated into INPUT FEATURES on full data before split
NO = Clean: target used for loss/weights/filtering only, or stats from train subset only
"""

warning_message = """
Target leakage: feature created from target variable y. Remove this feature - it contains the answer.
"""

min_confidence = 0.85
false_positive_risks = []

[tests]
# Test cases for ml-002-target-leakage

[[tests.positive]]
file = "test_positive/feature_derived_from_target.py"
description = "Feature created from target variable using groupby transform"
expected_issue = "Target leakage: feature derived from target variable"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "create_target_derived_feature"
snippet = "df.groupby(\"category\")[\"target\"].transform(\"mean\")"
lines = [5, 15]

[[tests.negative]]
file = "test_negative/no_target_derived_features.py"
description = "Features derived from other features, not from target"

[[tests.context_dependent]]
file = "test_context_dependent/target_encoding_in_training.py"
description = "Target encoding computed from training data only"
context_notes = "Debatable: uses target info but only from training set after split"
allow_detection = true
allow_skip = true

[tests.context_dependent.expected_location]
type = "function"
name = "target_encoding_on_train_only"
snippet = "category_means = train_df.groupby(\"category\")[\"target\"].mean()"
lines = [11]


[[tests.positive]]
file = "test_positive/future_aggregate.py"
description = "Features created by aggregating target variable sales statistics across groups"
expected_issue = "Target leakage: features computed from target variable sales using groupby transform"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "create_sales_features"
snippet = "df[\"weekly_avg\"] = df.groupby(\"store_id\")[\"sales\"].transform(\"mean\")"
lines = [2]

[[tests.positive]]
file = "test_positive/future_value_feature.py"
description = "Features derived from target variable statistics computed on full dataset"
expected_issue = "Target leakage: features contain target statistics from full dataset"
min_confidence = 0.85

[tests.positive.expected_location]
type = "function"
name = "add_target_stats"
snippet = "X[\"target_mean\"] = y.mean()"
lines = [8]

[[tests.negative]]
file = "test_negative/future_aggregate_fixed.py"
description = "Correct approach: compute statistics from training data only before merging with full dataset"

[[tests.negative]]
file = "test_negative/proper_features.py"
description = "Correct approach: features derived only from input features, not from target variable"
