# Pattern: ml-001-scaler-leakage
# Auto-migrated from YAML catalog on 2026-03-03

[meta]
id = "ml-001"
name = "scaler-leakage"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Data leakage occurs when a scaler, normalizer, or encoder is fit on the full dataset (including test data) before splitting into train/test sets. This causes the model's validation metrics to be overly optimistic because test set information leaked into the preprocessing step.
"""

explanation = """
Data leakage: scaler/encoder is fit on full data including test set. Model performance will be inflated. Use sklearn.pipeline.Pipeline so fitting happens inside each fold.

"""

tags = ["sklearn", "preprocessing", "data-leakage", "train-test-split"]
related_patterns = ["ml-003", "ml-007"]
references = ["https://scikit-learn.org/stable/common_pitfalls.html#data-leakage"]

[detection]
question = """
Analyze data preprocessing for data leakage.

WHY THIS MATTERS: If preprocessing statistics (mean, std, min, max, quantiles) are computed on the full dataset including test data, then test set information leaks into training. This causes overly optimistic validation metrics that don't reflect real-world performance.

Correct approach: Split data first, then fit scalers/encoders only on training data.

Does this code have data leakage from preprocessing?

IGNORE if mean/std/min/max values are read from module-level constants, dictionaries, JSON/YAML files, or function arguments (e.g., FORECAST_MEANS, NORM_STATS, config['mean']) — only flag when statistics are COMPUTED from array data (e.g., .mean(), .std(), np.mean(arr), scaler.fit(X) called on data directly).

Look for:
- Scaler/transformer fit_transform() called on full data BEFORE train_test_split()
- Train and test arrays concatenated/vstacked BEFORE computing statistics
- Manual mean()/std()/min()/max() computed by calling methods on actual data arrays (e.g., arr.mean(), np.std(arr)) on data that includes test samples — ONLY flag if these values are actively computed from the array, not if they are loaded from constants or passed as parameters

NOT a bug (answer NO):
- Statistics loaded from external constants, config files, pre-computed files, or hardcoded values (e.g., FORECAST_MEANS, NORM_STATS, config['mean']) — these are not fit on the current dataset
- Code contains a comment explicitly stating this is intentional (e.g., 'scaling on full dataset by design', 'empirically verified no impact') — do not flag documented design decisions
- Statistics computed on training data only, after split

YES = Bug found: preprocessing statistics actively computed from data that includes test samples
NO = Correct: statistics computed on training data only, statistics loaded from constants/config, or documented intentional choice
"""

warning_message = """
Data leakage: scaler/encoder is fit on full data including test set. Model performance will be inflated. Use sklearn.pipeline.Pipeline so fitting happens inside each fold.

"""

min_confidence = 0.85
false_positive_risks = ["Scaler fit on train-only data before explicit split variable naming"]

[tests]
