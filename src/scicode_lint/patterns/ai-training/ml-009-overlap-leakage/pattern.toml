# Pattern: ml-009-overlap-leakage
# Train/test data overlap - data flows from same source without verified disjoint split
# Based on Yang et al. ASE'22 "Data Leakage in Notebooks" overlap definition

[meta]
id = "ml-009"
name = "overlap-leakage"
category = "ai-training"
severity = "critical"
version = "2.0.0"
created = "2026-03-11"
updated = "2026-03-12"
author = "scicode-lint"

description = """
Overlap leakage occurs when training and test data both derive from the same source without using a splitting function that guarantees disjoint sets. This can result in the same data points appearing in both sets, invalidating evaluation metrics.
"""

explanation = """
Train/test overlap: Both datasets flow from the same source variable without verified disjoint splitting. Use sklearn.model_selection.train_test_split or similar functions that guarantee no overlap.
"""

tags = ["sklearn", "data-leakage", "train-test-split", "overlap"]
related_patterns = ["ml-001", "ml-007"]
references = [
    "https://scikit-learn.org/stable/common_pitfalls.html#data-leakage",
    "https://arxiv.org/abs/2209.03345"
]

[detection]
question = """
Analyze this code for OVERLAP LEAKAGE where a single undivided dataset IN THIS CODE is split unsafely.

WHY THIS MATTERS: If train and test datasets both come from the same source data without using a proper splitting function, they may contain overlapping data points. The model would be evaluated on data it was trained on.

CRITICAL: This bug requires identifying BOTH (a) a single undivided dataset in memory AND (b) an unsafe split operation on it. If data is loaded from separate sources or pre-split upstream, there is no overlap risk.

OVERLAP LEAKAGE EXISTS when:

1. UNSAFE MANUAL SPLITTING of a single dataset:
   - data.sample(frac=0.8) for train AND data.sample(frac=0.2) for test (may overlap!)
   - Random index selection without ensuring disjointness
   - Manual slicing with potential overlap (e.g., data[:800] and data[700:])

2. SAME IN-MEMORY SOURCE, NO SPLIT FUNCTION:
   - Both train_data and test_data assigned from same DataFrame/array variable
   - Filtering same dataset with conditions that overlap (e.g., score > 0.5 AND score > 0.3)

NO OVERLAP (correct patterns):
- sklearn.model_selection.train_test_split() - guarantees disjoint indices
- Sequential slicing: data[:n] and data[n:] — guaranteed disjoint
- Explicit index sets: train_idx, test_idx = indices[:800], indices[800:]
- Pre-split loading: loading from separate directories, Dataset("train")/Dataset("test"), separate config loaders, external split files
- Separate data sources: train from file A, test from file B
- Cross-validation with proper fold handling
- Mutually exclusive column filters: data[data["split"] == "train"] vs data[data["split"] == "test"] — a pre-annotated split column guarantees disjoint sets
- Demo/visualization code that doesn't run actual model training

Does THIS CODE contain a single undivided dataset that is split unsafely?

YES = Bug found: single dataset in memory split without guaranteed disjointness
NO = Correct: proper splitting, sequential slices, pre-split data, or separate sources
"""

warning_message = """
Overlap leakage: Train and test data derive from the same source without guaranteed disjoint splitting. Use sklearn.model_selection.train_test_split() or verify indices are disjoint.
"""

min_confidence = 0.75
false_positive_risks = ["Data from genuinely separate sources that happen to use similar variable names"]

[tests]

[[tests.positive]]
file = "test_positive/unsafe_sample_split.py"
description = "Using .sample() twice from same DataFrame - may have overlapping rows"
expected_issue = "Overlap leakage: train and test both sampled from same source, may overlap"
min_confidence = 0.75

[tests.positive.expected_location]
type = "function"
name = "split_with_sample"
snippet = "train = data.sample(frac=0.8, random_state=42)"
lines = [7]

[[tests.positive]]
file = "test_positive/overlapping_indices.py"
description = "Manual index slicing with overlap - train uses indices 0-800, test uses 700-1000"
expected_issue = "Overlap leakage: indices 700-800 appear in both sets"
min_confidence = 0.75

[tests.positive.expected_location]
type = "function"
name = "split_data_wrong"
snippet = "train = data[:800]"
lines = [6]

[[tests.positive]]
file = "test_positive/same_source_no_split.py"
description = "Overlapping filter conditions: quality > 0.5 for train overlaps with quality > 0.3 for test"
expected_issue = "Overlap leakage: filter conditions overlap, same rows appear in both sets"
min_confidence = 0.75

[tests.positive.expected_location]
type = "function"
name = "quality_based_split"
snippet = "high_quality = df[df[quality_col] > 0.5]"
lines = [5]

[[tests.negative]]
file = "test_negative/proper_split.py"
description = "Correct: sklearn train_test_split ensures disjoint sets"

[[tests.negative]]
file = "test_negative/separate_sources.py"
description = "Correct: train and test loaded from separate files"

[[tests.negative]]
file = "test_negative/explicit_disjoint_indices.py"
description = "Correct: explicit disjoint index assignment"

[[tests.negative]]
file = "test_negative/split_column_filter.py"
description = "Correct: mutually exclusive filter on split column guarantees disjoint sets"

[[tests.context_dependent]]
file = "test_context_dependent/sample_with_seed.py"
description = "Using .sample() with different random seeds - technically could still overlap"
context_notes = "With different seeds, overlap is unlikely but not impossible. Some may consider this acceptable."
allow_detection = true
allow_skip = true

[tests.context_dependent.expected_location]
type = "function"
name = "split_with_different_seeds"
snippet = "train = data.sample(frac=0.8, random_state=42)"
lines = [7]
