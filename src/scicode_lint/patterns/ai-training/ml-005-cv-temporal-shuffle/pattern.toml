[meta]
id = "ml-005"
name = "cv-temporal-shuffle"
category = "ai-training"
severity = "critical"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Temporal leakage occurs when KFold or cross-validation with shuffle=True is used on time-series data. Shuffling breaks temporal ordering, causing the model to train on future data to predict the past, leading to unrealistic performance estimates. Use TimeSeriesSplit for time-series data to respect temporal ordering.
"""

explanation = """
Temporal leakage: shuffled cross-validation on time-series data trains on future to predict past. Use TimeSeriesSplit.

"""

tags = ["sklearn", "cross-validation", "time-series", "temporal-data"]
related_patterns = ["ml-006"]
references = ["https://scikit-learn.org/stable/modules/cross_validation.html#time-series-split"]

[detection]
question = """
Analyze cross-validation setup for time-series data.

Shuffling time-series data in cross-validation causes temporal leakage: the model trains on future data to predict the past. This produces unrealistic performance estimates.

Correct approach: Use TimeSeriesSplit or shuffle=False to respect temporal ordering.

Does this code shuffle time-series data in cross-validation fold assignment?

BOTH conditions must be true for YES:
1. shuffle=True is used inside a CV SPLITTER constructor (KFold, StratifiedKFold) or cross_val_score call — NOT on a DataLoader or batch generator
2. Explicit evidence of temporal data: datetime index, column names like date/time/timestamp, variable names like time_series, or data sorted by date

NOT a bug (answer NO):
- shuffle=True on a DataLoader or batch generator (mini-batch shuffling within a chronological training set is standard practice)
- No evidence of temporal data (graph-structured data, tabular with no temporal columns, image batches)
- TimeSeriesSplit used
- shuffle=False on CV splitter
- Data with no temporal ordering (cross-sectional surveys, image datasets, molecular data)

YES = Bug found: shuffled CV SPLITTER on data with explicit temporal evidence
NO = Correct: TimeSeriesSplit used, shuffle=False, DataLoader shuffle only, or non-temporal data
"""

warning_message = """
Temporal leakage: shuffled cross-validation on time-series data trains on future to predict past. Use TimeSeriesSplit.

"""

min_confidence = 0.85
false_positive_risks = []

