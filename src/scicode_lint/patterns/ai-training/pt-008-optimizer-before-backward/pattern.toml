[meta]
id = "pt-008"
name = "optimizer-before-backward"
category = "ai-training"
severity = "high"
version = "1.0.0"
created = "2024-01-15"
updated = "2026-03-03"
author = "scicode-lint"

description = """
Calling optimizer.step() before loss.backward() updates parameters with stale or zero gradients from the previous iteration. The correct order is: zero_grad(), forward, loss, backward(), step().
"""

explanation = """
Calling optimizer.step() before loss.backward() updates parameters before gradients are computed. This means the optimizer updates with stale or zero gradients from the previous iteration, preventing the model from learning correctly. The correct order is: zero_grad(), forward pass, loss computation, backward(), then step().
"""

tags = ["pytorch", "optimizer", "gradients", "training"]
related_patterns = ["pt-004"]
references = ["https://pytorch.org/tutorials/beginner/basics/optimization_tutorial.html"]

[detection]
question = """
Analyze the training loop order of operations.

The correct PyTorch training sequence is: zero_grad() → forward → loss → backward() → step(). Calling optimizer.step() before backward() updates parameters with stale or zero gradients.

Step 1 — Prerequisite (if this fails, answer NO immediately):
Both of the following must be explicitly visible in THIS code:
- A call to optimizer.step()
- A call to loss.backward() (or .backward() on any tensor)
If either is absent, answer NO — the bug cannot exist here.
Note: scheduler.step() is NOT the same as optimizer.step() — schedulers adjust learning rates and do not use gradients. Ignore scheduler.step() for this check.

IMPORTANT: If the training loop is hidden inside a called method (e.g., exp.run(), trainer.train(), builder.run_model()), you are looking at the wrong level. Answer NO — you cannot verify ordering from a call site.

Step 2 — Ordering check (only if Step 1 passes):
Does optimizer.step() appear BEFORE loss.backward() in the same training loop body?

YES = Bug found: optimizer.step() called before backward(), both visible in same scope
NO = Correct: backward() called before step(), OR the code is a wrapper/orchestration function that does not contain both operations directly
"""

warning_message = """
Optimizer step before backward: Calling optimizer.step() before loss.backward() updates parameters with old/zero gradients instead of current gradients. The correct sequence is: optimizer.zero_grad(), compute loss, loss.backward(), then optimizer.step().
"""

